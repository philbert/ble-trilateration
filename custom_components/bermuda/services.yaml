dump_devices:
  name: Dump devices
  fields:
    addresses:
      required: false
      example: "EE:E8:37:9F:6B:54 C7:B8:C6:B0:27:11 AA:AA:AA:AA:AA:AA"
      default: ""
    configured_devices:
      required: false
      example: "False"
      default: true
    redact:
      required: false
      example: "False"
      default: false
record_calibration_sample:
  name: Record calibration sample
  fields:
    device_id:
      required: true
      example: "abc123def456"
    room_area_id:
      required: true
      example: "living_room"
    x_m:
      required: true
      example: "4.2"
    y_m:
      required: true
      example: "1.8"
    z_m:
      required: true
      example: "1.1"
    sample_radius_m:
      required: false
      example: "1.0"
      default: 1.0
    duration_s:
      required: false
      example: "60"
      default: 60
    notes:
      required: false
      example: "Near sofa"
      default: ""
